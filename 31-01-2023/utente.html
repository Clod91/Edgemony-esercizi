<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Iscrizione Newsletter</title>
  </head>
  <body>
    <form>
      <div class="testo">
        <h2>Iscriviti alla Newsletter</h2>
        <p>ti servirà per rimanere aggiornato su tutte le ultime novità!</p>
      </div>
      <input
        type="email"
        class="email"
        name="email"
        id="email"
        placeholder="inserisci la tua email"
      />
      <input
        type="text"
        class="nome"
        name="nome"
        id="nome"
        placeholder="come devo chiamarti?"
      />
      <div class="checkbox">
        <input type="checkbox" name="autorizzazione" id="autorizzazione" />
        <label for="autorizzazione">Autorizzo al trattamento dei dati </label>
      </div>
      <button class="btnInput">Registrati</button>
    </form>
  </body>
</html>
